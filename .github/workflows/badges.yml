name: Update Badges

on:
  schedule:
    # Runs daily at 2 AM UTC
    - cron: "0 2 * * *"
  workflow_dispatch:

jobs:
  update-badges:
    name: Update README with Credly Badges
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Update badges from Credly
        uses: pemtajo/badge-readme@main
        with:
          CREDLY_USER: kaio.fellipe
          NUMBER_LAST_BADGES: 10

      - name: Pull latest (badge action pushes via API)
        run: |
          git pull --rebase origin ${{ github.ref_name }}

      - name: Collapse badge layout to single line
        run: |
          python3 <<'EOF'
          import re

          with open('README.md', 'r', encoding='utf-8') as f:
              content = f.read()

          pattern = r'(<!--START_SECTION:badges-->)(.*?)(<!--END_SECTION:badges-->)'

          def collapse(m):
              inner = re.sub(r'\s+', ' ', m.group(2)).strip()
              return f"{m.group(1)}\n{inner}\n{m.group(3)}"

          new_content = re.sub(pattern, collapse, content, flags=re.DOTALL)

          if new_content != content:
              with open('README.md', 'w', encoding='utf-8') as f:
                  f.write(new_content)
              print("Badge layout collapsed.")
          else:
              print("No layout changes needed.")
          EOF

      - name: Commit layout fix (if any)
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if git diff --quiet README.md; then
            echo "Nothing to commit."
          else
            git add README.md
            git commit -m "chore(readme): collapse badge layout to single line"
            git push
          fi
